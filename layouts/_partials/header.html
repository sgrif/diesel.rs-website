{{ $section := .Section }}
{{ $currentURL := .RelPermalink }}

<header id="site-header">
	<a id="site-header-logo" href="{{ .Site.Home.Permalink }}">
		<img src="{{ "images/logo.svg" | absURL }}" alt="Diesel Logo">
	</a>
	<nav id="site-header-menu" aria-label="Main">
		{{ range $.Site.Menus.main }}
			{{ if (urls.Parse .URL).IsAbs }}
			<a href="{{ .URL | absLangURL }}" rel="external" target="_blank">{{ .Name }}</a>
			{{ else }}
			<a href="{{ .URL | absLangURL }}" {{ if or (eq $section .Identifier) (eq $currentURL .URL) -}} class="active"{{ end }}>{{ .Name }}</a>
			{{ end }}
		{{ end }}
	</nav>
	<div id="site-header-actions">
		<div id="search-box">
			<pagefind-modal-trigger></pagefind-modal-trigger>
			<pagefind-modal></pagefind-modal>
		</div>
		<a class="repo-link" href="https://github.com/{{ .Site.Params.project.github.main }}" target="_blank">
			<img src="{{ "images/github-logo.svg" | absURL }}" alt="GitHub Logo">
		</a>
	</div>
</header>
