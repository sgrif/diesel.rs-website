{{ $iconMap := dict
"note" "info"
"tip" "lightbulb"
"important" "brightness_alert"
"warning" "warning"
"caution" "exclamation"
}}

<div class="alert alert-{{ .AlertType }}">
	<div class="alert-header">
		<span class="material-symbols-outlined">{{ index $iconMap .AlertType }}</span>
		<span>
		{{ with .AlertTitle }}
			{{ . }}
		{{ else }}
			{{ or (i18n .AlertType) (title .AlertType) }}
		{{ end }}
		</span>
	</div>
	<div class="alert-body">
		{{ .Text }}
	</div>
</div>
