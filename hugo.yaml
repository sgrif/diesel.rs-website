# For more info: https://gohugo.io/configuration/
enableGitInfo: true
enableRobotsTXT: true
disableHugoGeneratorInject: true
disableKinds: [taxonomy, term]

publishDir: docs
baseURL: https://diesel.rs

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
        title: true
  tableOfContents:
    pre: '<nav id="TableOfContents" aria-label="Table of Contents">'
    post: '</nav>'

defaultContentLanguage: en
languages:
  en:
    weight: 1
    languageName: English
    languageCode: en-US
    contentDir: content/en
    title: Diesel
    params:
      description: >-
        Diesel is the most productive way to interact with databases in Rust
        because of its safe and composable abstractions over queries.

params:
  enablePageFind: true
  analytics:
    umami:
      id: cbfc6769-b0b4-4256-9fbc-f5c053b55bed
      url: https://umami.weiznich.de

  project:
    startYear: 2015
    presentYear: 2026
    themeColor: "#535379"
    latestRelease: Diesel 2.3.9
    copyrightHolder: The Diesel Core Team
    github:
      main: diesel-rs/diesel
      website: sgrif/diesel.rs-website

menus:
  main:
    - identifier: news
      name: News
      pageRef: /news
      weight: 10
    - identifier: guides
      name: Guides
      pageRef: /guides
      weight: 20
    - identifier: api_docs
      name: API Documentation
      url: "https://docs.diesel.rs/main/diesel/index.html"
      weight: 30
    - identifier: changelog
      name: Changelog
      pageRef: /changelog
      weight: 40