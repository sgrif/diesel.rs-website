name: Hugo CI-CD

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'

      - name: Build
        run: hugo --minify

      - name: Pagefind
        run: |
          curl -L https://github.com/Pagefind/pagefind/releases/download/v1.5.2/pagefind-v1.5.2-x86_64-unknown-linux-musl.tar.gz -o pagefind.tar.gz
          tar -xzf pagefind.tar.gz
          ./pagefind --site public

      - name: Deploy
        if: github.repository == 'sgrif/diesel.rs-website' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_branch: gh-pages
          publish_dir: ./public
          cname: diesel.rs
